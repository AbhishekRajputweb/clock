<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>clock</title>
    <link rel="stylesheet" href="style.css">

    <style>
        /* body{
            background-color: rgb(205, 230, 230);
            align-items: center;
        } */
    </style>
</head>
<body>
    <h1>clock:</h1>
    <div id="box">
        <div id="clock" ><span id="hour"></span> : <span id="min"></span> : <span id="sec"></span> <span id="am"></span></div>
    </div>


    <script>
        
        var date =new Date()
        var h = date.getHours(); 
        var m = date.getMinutes();
        var s = date.getSeconds();
        var a = "PM"

        if(h==0){
            h=12;
        }
        if(h<12){
            h=h-12;
            a="AM";

        }
       
        // document.getElementById('hour').innerHTML = h;
        // document.getElementById('min').innerHTML = m;
        // document.getElementById('sec').innerHTML = s;
        // document.getElementById('am').innerHTML = a;
        function timer()
        {
            s++;
            if(s==60)
            {
                s=0;
                m++;
            }

            if(m==60)
            {
                m=0;
                h++;
            }  
        
        document.getElementById('hour').innerHTML = h;
        document.getElementById('min').innerHTML = m;
        document.getElementById('sec').innerHTML = s;
        document.getElementById('am').innerHTML=a;
        setTimeout(timer,1000);
        }
      timer()
        

    
    </script>
</body>
</html>
